<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سبد خرید | بیرق</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg: #07111f;
      --bg-2: #0b1b31;
      --bg-3: #102847;
      --card: rgba(255,255,255,0.05);
      --card-2: rgba(255,255,255,0.08);
      --line: rgba(255,255,255,0.09);
      --text: #eef4ff;
      --muted: #aab8cf;
      --accent: #f7b500;
      --accent-2: #7bc3ff;
      --success: #28d17c;
      --danger: #ff6b6b;
      --shadow: 0 20px 50px rgba(0,0,0,.35);
      --radius: 24px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:"Vazirmatn",sans-serif;
      background:
        radial-gradient(circle at top right, rgba(123,195,255,0.12), transparent 28%),
        radial-gradient(circle at left center, rgba(247,181,0,0.08), transparent 22%),
        linear-gradient(180deg, var(--bg), #050b14 78%);
      color:var(--text);
      line-height:1.9;
      min-height:100vh;
    }

    a{ color:inherit; text-decoration:none; }

    .container{
      width:min(1180px, 92%);
      margin:0 auto;
    }

    /* ---------- HEADER ---------- */
    header{
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7,17,31,.86);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }

    .nav{
      min-height: 84px;
      display:grid;
      grid-template-columns: auto 1fr auto;
      align-items:center;
      gap:18px;
      padding: 12px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:800;
      min-width:0;
    }

    .brand-mark{
      width:48px;
      height:48px;
      border-radius:16px;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      background: linear-gradient(145deg, #ffd86a, var(--accent));
      color:#172033;
      box-shadow: 0 14px 35px rgba(247,181,0,.22);
    }

    .brand-text{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }

    .brand-text span:first-child{
      font-size:1.02rem;
      white-space:nowrap;
    }

    .brand-text span:last-child{
      color:var(--muted);
      font-size:.82rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .menu{
      justify-self:center;
      display:flex;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .menu a{
      color:var(--muted);
      padding:8px 0;
      position:relative;
      transition:.2s ease;
    }

    .menu a:hover{
      color:var(--text);
    }

    .menu a::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:-2px;
      height:2px;
      border-radius:999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transform:scaleX(0);
      transform-origin:center;
      transition:transform .22s ease;
    }

    .menu a:hover::after{
      transform:scaleX(1);
    }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-self:end;
    }

    .btn{
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:16px;
      padding:12px 18px;
      font-family:inherit;
      font-size:.95rem;
      display:inline-flex;
      align-items:center;
      gap:10px;
      transition:.25s ease;
    }

    .btn:hover{ transform:translateY(-1px); }

    .btn-primary{
      background: linear-gradient(145deg, #ffd86a, var(--accent));
      color:#132033;
      box-shadow: 0 12px 28px rgba(247,181,0,.25);
      font-weight:700;
    }

    .btn-secondary{
      background: rgba(255,255,255,.06);
      color:var(--text);
      border:1px solid var(--line);
    }

    .icon-btn{
      white-space:nowrap;
    }

    .cart-btn{
      position:relative;
    }

    .cart-count{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:24px;
      height:24px;
      padding:0 7px;
      border-radius:999px;
      background:#fff;
      color:#172033;
      font-weight:800;
      font-size:.85rem;
    }

    /* ---------- MAIN ---------- */
    .page{
      padding:34px 0 60px;
    }

    .page-head{
      margin-bottom:20px;
    }

    .page-title{
      margin:0;
      font-size:2rem;
    }

    .page-subtitle{
      margin:8px 0 0;
      color:var(--muted);
    }

    .cart-layout{
      display:grid;
      grid-template-columns: 1.65fr .95fr;
      gap:20px;
      align-items:start;
    }

    .panel{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .panel-head{
      padding:18px 20px;
      border-bottom:1px solid var(--line);
      background: rgba(255,255,255,.03);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-weight:700;
    }

    .cart-items{
      padding:12px;
    }

    .cart-item{
      display:grid;
      grid-template-columns: 88px 1fr auto;
      gap:16px;
      padding:14px;
      border-radius:18px;
      background: rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      margin-bottom:12px;
      align-items:center;
    }

    .item-thumb{
      width:88px;
      height:88px;
      border-radius:18px;
      background:
        radial-gradient(circle at top right, rgba(123,195,255,.25), transparent 40%),
        linear-gradient(135deg, #0d2140, #142f54 74%);
      display:grid;
      place-items:center;
      color:#fff;
      font-size:1.8rem;
      border:1px solid rgba(255,255,255,.06);
    }

    .item-info h3{
      margin:0 0 6px;
      font-size:1.05rem;
    }

    .item-meta{
      color:var(--muted);
      font-size:.94rem;
    }

    .item-actions{
      display:flex;
      flex-direction:column;
      align-items:end;
      gap:10px;
    }

    .price{
      font-weight:800;
      color:#fff;
    }

    .qty-box{
      display:flex;
      align-items:center;
      gap:8px;
      background: rgba(255,255,255,.05);
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 10px;
    }

    .qty-box button{
      width:30px;
      height:30px;
      border:none;
      border-radius:50%;
      cursor:pointer;
      background: rgba(255,255,255,.08);
      color:#fff;
      font-size:1rem;
    }

    .small-btn{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      font-family:inherit;
      cursor:pointer;
      background: rgba(255,107,107,.12);
      color:#ffd0d0;
      border:1px solid rgba(255,107,107,.22);
    }

    .summary{
      position:sticky;
      top:104px;
      padding-bottom:18px;
    }

    .summary-content{
      padding:18px;
    }

    .summary-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid var(--line);
      color:var(--muted);
    }

    .summary-row strong{
      color:var(--text);
    }

    .summary-total{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding-top:16px;
      margin-top:6px;
      font-size:1.08rem;
      font-weight:800;
    }

    .summary-actions{
      display:grid;
      gap:12px;
      margin-top:18px;
    }

    .empty-state{
      text-align:center;
      padding:60px 20px;
      color:var(--muted);
    }

    .empty-state i{
      font-size:4rem;
      margin-bottom:18px;
      color:rgba(255,255,255,.28);
    }

    .footer{
      border-top:1px solid var(--line);
      background: rgba(7,17,31,.86);
      padding:18px 0;
      color:var(--muted);
      text-align:center;
      margin-top:30px;
    }

    @media (max-width: 980px){
      .nav{
        grid-template-columns: 1fr;
        justify-items:center;
      }
      .menu{
        order:3;
      }
      .nav-actions{
        justify-self:center;
      }
    }

    @media (max-width: 900px){
      .cart-layout{ grid-template-columns:1fr; }
      .summary{ position:static; }
    }

    @media (max-width: 640px){
      .cart-item{ grid-template-columns:1fr; text-align:center; }
      .item-actions{ align-items:center; }
      .page-title{ font-size:1.6rem; }
      .nav-actions{ flex-direction:column; }
    }
    .auth-icon{
  width: 18px;
  height: 18px;
  object-fit: contain;
  display: inline-block;
  flex: 0 0 auto;
}

  </style>
</head>
<body>
  <header>
    <div class="container">
      <nav class="nav">
        <a class="brand" href="index.html.html#top" aria-label="رسانه هنری بیرق">
          <div class="brand-mark">
            <i class="fa-solid fa-bolt"></i>
          </div>
          <div class="brand-text">
            <span>رسانه هنری بیرق</span>
            <span>ابزارها، لایه‌بازها و پک‌های گرافیکی</span>
          </div>
        </a>

        <div class="menu" aria-label="منوی اصلی">
          <a href="index.html.html#top">خانه</a>
          <a href="index.html.html#products">پک‌های گرافیکی</a>
          <a href="index.html.html#about">درباره ما</a>
          <a href="index.html.html#contact">تماس</a>
        </div>

        <div class="nav-actions">
          <button class="btn btn-secondary icon-btn" id="authBtn" onclick="loginWithEitaa()">
  <img src="103-GraFa-4.svg" alt="Eitaa" class="auth-icon">
  <span id="authText">ورود با ایتا</span>
</button>
          <button class="btn btn-primary cart-btn icon-btn" onclick="openCart()" aria-label="سبد خرید">
  <i class="fa-solid fa-basket-shopping"></i>
  <span>سبد خرید</span>
  <span class="cart-count" id="cartCount">۰</span>
</button>
        </div>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <div class="page-head">
        <h1 class="page-title">سبد خرید شما</h1>
        <p class="page-subtitle">آیتم‌ها را بررسی کنید، تعداد را تغییر دهید یا کالاها را حذف کنید.</p>
      </div>

      <div class="cart-layout">
        <section class="panel">
          <div class="panel-head">
            <span>آیتم‌های سبد</span>
            <button class="small-btn" onclick="clearCart()">خالی کردن سبد</button>
          </div>
          <div class="cart-items" id="cartItems"></div>
        </section>

        <aside class="panel summary">
          <div class="panel-head">
            <span>خلاصه سفارش</span>
          </div>

          <div class="summary-content">
            <div class="summary-row">
              <span>تعداد کالا</span>
              <strong id="summaryCount">0</strong>
            </div>

            <div class="summary-row">
              <span>مجموع قیمت</span>
              <strong id="summarySubtotal">۰ تومان</strong>
            </div>

            <div class="summary-total">
              <span>قابل پرداخت</span>
              <span id="summaryTotal">۰ تومان</span>
            </div>

            <div class="summary-actions">
              <button class="btn btn-primary" onclick="checkout()">
                <i class="fa-solid fa-credit-card"></i>
                <span>ثبت و ادامه پرداخت</span>
              </button>

              <a href="index.html.html" class="btn btn-secondary" style="justify-content:center;">
                <i class="fa-solid fa-arrow-right"></i>
                <span>ادامه خرید</span>
              </a>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© <span id="year"></span> بیرق - همه حقوق محفوظ است</div>
  </footer>

  <script>
    const CART_KEY = "cart";
    const USER_KEY = "eitaa_user";

    function safeParse(json, fallback) {
      try { return JSON.parse(json) ?? fallback; }
      catch { return fallback; }
    }

    function loadCart() {
      return safeParse(localStorage.getItem(CART_KEY), []);
    }

    function saveCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    function formatPrice(price) {
      return new Intl.NumberFormat("fa-IR").format(price) + " تومان";
    }

    function updateCartCount() {
      const cart = loadCart();
      const count = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
      const el = document.getElementById("cartCount");
      if (el) el.textContent = new Intl.NumberFormat("fa-IR").format(count);
    }

    function renderCart() {
      const cart = loadCart();
      const box = document.getElementById("cartItems");

      let totalQty = 0;
      let subtotal = 0;

      if (!cart.length) {
        box.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-basket-shopping"></i>
            <h3>سبد خرید شما خالی است</h3>
            <p>برای شروع، از صفحه اصلی محصولات مورد نظر را انتخاب کنید.</p>
          </div>
        `;
      } else {
        box.innerHTML = cart.map((item, index) => {
          const qty = item.qty || 1;
          const lineTotal = (item.price || 0) * qty;
          totalQty += qty;
          subtotal += lineTotal;

          return `
            <div class="cart-item">
              <div class="item-thumb"><i class="fa-solid fa-box"></i></div>
              <div class="item-info">
                <h3>${item.name || "محصول"}</h3>
                <div class="item-meta">
                  کد محصول: ${item.id ?? "-"}<br>
                  قیمت واحد: ${formatPrice(item.price || 0)}
                </div>
              </div>
              <div class="item-actions">
                <div class="price">${formatPrice(lineTotal)}</div>
                <div class="qty-box">
                  <button onclick="changeQty(${index}, -1)">−</button>
                  <span>${qty}</span>
                  <button onclick="changeQty(${index}, 1)">+</button>
                </div>
                <button class="small-btn" onclick="removeItem(${index})">حذف</button>
              </div>
            </div>
          `;
        }).join("");
      }

      document.getElementById("summaryCount").textContent = totalQty;
      document.getElementById("summarySubtotal").textContent = formatPrice(subtotal);
      document.getElementById("summaryTotal").textContent = formatPrice(subtotal);
      updateCartCount();
    }

    function changeQty(index, delta) {
      const cart = loadCart();
      if (!cart[index]) return;
      cart[index].qty = (cart[index].qty || 1) + delta;
      if (cart[index].qty <= 0) cart.splice(index, 1);
      saveCart(cart);
      renderCart();
    }

    function removeItem(index) {
      const cart = loadCart();
      cart.splice(index, 1);
      saveCart(cart);
      renderCart();
    }

    function clearCart() {
      if (!confirm("سبد خرید خالی شود؟")) return;
      localStorage.removeItem(CART_KEY);
      renderCart();
    }

    function checkout() {
      const cart = loadCart();
      if (!cart.length) return alert("سبد خرید خالی است.");
      alert("فعلاً صفحه پرداخت فعال نشده است.");
    }

    function autoLoginFromEitaa() {
      const cached = safeParse(localStorage.getItem(USER_KEY), null);
      const initData = window.Eitaa?.WebApp?.initDataUnsafe;
      const user = initData?.user || cached;

      const authBtn = document.getElementById("authBtn");
      const authText = document.getElementById("authText");

      if (user) {
        const name = [user.first_name, user.last_name].filter(Boolean).join(" ").trim()
          || user.username
          || "کاربر";

        authText.textContent = name;
        authBtn.classList.remove("btn-secondary");
        authBtn.classList.add("btn-primary");
        localStorage.setItem(USER_KEY, JSON.stringify(user));
      } else {
        authText.textContent = "ورود با ایتا";
      }
    }

    function loginWithEitaa() {
      autoLoginFromEitaa();
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("year").textContent = new Date().getFullYear();
      autoLoginFromEitaa();
      renderCart();
    });

    window.addEventListener("storage", (event) => {
      if (event.key === CART_KEY) renderCart();
      if (event.key === USER_KEY) autoLoginFromEitaa();
    });
    function openCart(){

  const cached = localStorage.getItem("eitaa_user");
  const initData = window.Eitaa?.WebApp?.initDataUnsafe;

  const user = initData?.user || (cached ? JSON.parse(cached) : null);

  if(!user){

    alert("برای مشاهده سبد خرید ابتدا باید با ایتا وارد شوید");

    return;
  }

  window.location.href = "cart.html";
}
  </script>
</body>
</html>
