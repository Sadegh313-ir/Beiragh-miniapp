<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پک‌های گرافیکی | بیرق</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#07111f;
  --bg-2:#0b1b31;
  --bg-3:#102847;
  --card:rgba(255,255,255,0.05);
  --line:rgba(255,255,255,0.09);
  --text:#eef4ff;
  --muted:#aab8cf;
  --accent:#f7b500;
  --accent-2:#7bc3ff;
}

*{box-sizing:border-box; outline: none;}

body{
  margin:0;
  font-family:"Vazirmatn",sans-serif;
  background:
    radial-gradient(circle at top right, rgba(123,195,255,0.12), transparent 28%),
    radial-gradient(circle at left center, rgba(247,181,0,0.08), transparent 22%),
    linear-gradient(180deg,var(--bg),#050b14 78%);
  color:var(--text);
  min-height: 100vh;
}

a { text-decoration: none; }

.container{
  width:min(1180px,92%);
  margin:auto;
}

/* --- Header Styles --- */
header{
  position:sticky;
  top:0;
  background:rgba(7,17,31,.85);
  backdrop-filter:blur(15px);
  border-bottom:1px solid var(--line);
  z-index:1000;
}

.nav{
  display:flex;
  align-items:center;
  min-height:80px;
  gap:1rem;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:800;
  color: #fff;
}

.brand-mark{
  width:42px;
  height:42px;
  border-radius:12px;
  display:grid;
  place-items:center;
  background:linear-gradient(145deg,#ffd86a,var(--accent));
  color:#111;
}

.menu{
  display:flex;
  gap:1.5rem;
  margin-inline: 40px;
}

.menu a{
  color:var(--muted);
  font-size: 0.95rem;
  font-weight: 500;
  transition: 0.3s;
}

.menu a:hover, .menu a.active{
  color:var(--accent);
}

.nav-actions{
  display:flex;
  gap:.8rem;
  margin-inline-start:auto;
  align-items:center;
}

/* --- Buttons --- */
.btn{
  border:none;
  cursor:pointer;
  border-radius:14px;
  padding:.6rem 1.2rem;
  display:flex;
  align-items:center;
  gap:.5rem;
  font-family:inherit;
  font-weight:700;
  transition: 0.3s;
}

.btn-secondary{
  background:rgba(255,255,255,.06);
  border:1px solid var(--line);
  color:white;
}

.btn-secondary:hover { background: rgba(255,255,255,0.1); }

.btn-primary{
  background:linear-gradient(145deg,#ffd86a,var(--accent));
  color:#111;
}

.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(247, 181, 0, 0.3); }

.cart-count{
  background:#fff;
  color:#111;
  border-radius:999px;
  padding:2px 7px;
  font-size:.75rem;
  font-weight:800;
}

/* --- Hero Slider (Digikala Style) --- */
.hero-slider {
  padding: 25px 0;
}

.slider-wrapper {
  position: relative;
  width: 100%;
  height: 380px;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.slides {
  display: flex;
  height: 100%;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.slide {
  min-width: 100%;
  height: 100%;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.slider-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
  width: 48px;
  height: 48px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  transition: 0.3s;
  z-index: 10;
}

.slider-btn:hover { background: rgba(255, 255, 255, 0.3); }
.prev { right: 20px; }
.next { left: 20px; }

.dots {
  position: absolute;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 8px;
}

.dot {
  width: 8px;
  height: 8px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  cursor: pointer;
  transition: 0.3s;
}

.dot.active {
  background: #fff;
  width: 24px;
  border-radius: 10px;
}

/* --- Products Grid --- */
main{ padding: 20px 0 60px; }

.section-title{
  font-size:1.6rem;
  margin-bottom:25px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-title::before {
    content: '';
    width: 4px;
    height: 24px;
    background: var(--accent);
    border-radius: 10px;
}

.products-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
}

.product-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:24px;
  overflow:hidden;
  transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.product-card:hover{
  transform:translateY(-8px);
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.2);
}

.product-thumb{
  height:180px;
  background:linear-gradient(135deg,#0d2140,#142f54);
  display:grid;
  place-items:center;
  font-size:3rem;
  color:var(--accent);
}

.product-body{ padding:20px; }

.product-name{ font-weight:800; font-size: 1.1rem; margin-bottom:8px; }

.product-desc{ color:var(--muted); font-size:.9rem; min-height:45px; line-height: 1.6; }

.product-bottom{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:20px;
  padding-top: 15px;
  border-top: 1px solid var(--line);
}

.price{ font-weight:800; color: var(--accent-2); font-size: 1.1rem; }

footer{
  text-align:center;
  padding:40px;
  border-top:1px solid var(--line);
  color:var(--muted);
  background: rgba(0,0,0,0.2);
}

@media (max-width: 768px) {
  .menu { display: none; }
  .slider-wrapper { height: 200px; border-radius: 15px; }
  .nav-actions .btn span { display: none; }
}
</style>
</head>
<body>

<header>
<div class="container">
<nav class="nav">

<a class="brand" href="index.html.html">
<div class="brand-mark"><i class="fa-solid fa-bolt"></i></div>
<span>رسانه هنری بیرق</span>
</a>

<div class="menu">
<a href="index.html.html">خانه</a>
<a href="products.html" class="active">پک‌های گرافیکی</a>
<a href="index.html.html#about">درباره ما</a>
<a href="index.html.html#contact">تماس</a>
</div>

<div class="nav-actions">
<button class="btn btn-secondary" id="authBtn" onclick="loginWithEitaa()">
<img src="103-GraFa-4.svg" width="18" style="filter: brightness(0) invert(1);">
<span id="authText">ورود با ایتا</span>
</button>

<button class="btn btn-primary cart-btn" onclick="openCart()">
<i class="fa-solid fa-basket-shopping"></i>
<span>سبد خرید</span>
<span class="cart-count" id="cartCount">۰</span>
</button>
</div>

</nav>
</div>
</header>

<section class="hero-slider">
  <div class="container">
    <div class="slider-wrapper">
      <div class="slides" id="slider">
        <!-- بنر ۱ - آدرس عکس خودت را در src بگذار -->
        <div class="slide">
          <a href="#"><img src="banner1.jpg" alt="بنر تبلیغاتی ۱"></a>
        </div>
        <!-- بنر ۲ -->
        <div class="slide">
          <a href="#"><img src="banner2.jpg" alt="بنر تبلیغاتی ۲"></a>
        </div>
      </div>
      <button class="slider-btn prev" onclick="moveSlide(-1)">❮</button>
      <button class="slider-btn next" onclick="moveSlide(1)">❯</button>
      <div class="dots" id="dots">
        <span class="dot active" onclick="currentSlide(0)"></span>
        <span class="dot" onclick="currentSlide(1)"></span>
      </div>
    </div>
  </div>
</section>

<main>
<div class="container">
<h2 class="section-title">محصولات ویژه</h2>
<div class="products-grid" id="productsGrid"></div>
</div>
</main>

<footer>
© <span id="year"></span> تمامی حقوق برای رسانه هنری بیرق محفوظ است.
</footer>

<script>
const CART_KEY="cart";
const USER_KEY="eitaa_user";

// لیست محصولات
const products=[
  {id:1, name:"پک بنر محرم", price:120000, desc:"مجموعه المان‌های لایه‌باز ویژه طراحی بنر"},
  {id:2, name:"قالب استوری هیئت", price:95000, desc:"۱۰ قالب آماده استوری اینستاگرام و ایتا"},
  {id:3, name:"پک تایپوگرافی مذهبی", price:70000, desc:"خطاطی اسامی ائمه با کیفیت عالی"},
  {id:4, name:"کاور هایلایت مذهبی", price:45000, desc:"طرح‌های شیک برای هایلایت پیج"}
];

// اسلایدر
let currentIdx = 0;
const slides = document.querySelectorAll('.slide');
const dots = document.querySelectorAll('.dot');

function updateSlider() {
  const slider = document.getElementById('slider');
  slider.style.transform = `translateX(${currentIdx * 100}%)`;
  dots.forEach((dot, index) => dot.classList.toggle('active', index === currentIdx));
}

function moveSlide(dir) {
  currentIdx = (currentIdx + dir + slides.length) % slides.length;
  updateSlider();
}

function currentSlide(idx) { currentIdx = idx; updateSlider(); }
setInterval(() => moveSlide(1), 5000);

// توابع فروشگاه
function formatPrice(p){ return new Intl.NumberFormat("fa-IR").format(p)+" تومان"; }

function renderProducts(){
  const grid=document.getElementById("productsGrid");
  grid.innerHTML=products.map(p=>`
    <div class="product-card">
      <div class="product-thumb"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
      <div class="product-body">
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-bottom">
          <div class="price">${formatPrice(p.price)}</div>
          <button class="btn btn-primary" onclick="addToCart(${p.id})">افزودن</button>
        </div>
      </div>
    </div>
  `).join("");
}

function updateCartCount(){
  const cart = JSON.parse(localStorage.getItem(CART_KEY) || "[]");
  const count = cart.reduce((s,i)=> s + i.qty, 0);
  document.getElementById("cartCount").textContent = new Intl.NumberFormat("fa-IR").format(count);
}

function addToCart(id){
  const product = products.find(p=>p.id===id);
  let cart = JSON.parse(localStorage.getItem(CART_KEY) || "[]");
  const existing = cart.find(i=>i.id===id);
  if(existing) existing.qty++; else cart.push({...product, qty:1});
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
  updateCartCount();
  alert("به سبد خرید اضافه شد");
}

function openCart(){
  if(!localStorage.getItem(USER_KEY)) { alert("ابتدا وارد حساب کاربری شوید"); return; }
  location.href="cart.html";
}

function loginWithEitaa(){
  const user = window.Eitaa?.WebApp?.initDataUnsafe?.user || {first_name: "کاربر مهمان"};
  localStorage.setItem(USER_KEY, JSON.stringify(user));
  document.getElementById("authText").textContent = user.first_name;
  alert("خوش آمدید " + user.first_name);
}

document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("year").textContent=new Date().getFullYear();
  renderProducts();
  updateCartCount();
  const user = JSON.parse(localStorage.getItem(USER_KEY));
  if(user) document.getElementById("authText").textContent = user.first_name;
});
</script>

</body>
</html>
